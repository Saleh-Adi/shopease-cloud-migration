version: '3.8'
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: project@123
      MYSQL_DATABASE: shopease
    ports:
      - "3306:3306"
  api:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - db
  web:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api
